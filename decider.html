<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tab Decider</title>
<link rel="icon" href="icons/icon-48.png" />
<link rel="stylesheet" href="decider.css" />
</head>
<body>
<div id="app">
  <header id="app-header">
    <h1>Tab Decider</h1>
    <div id="progress">Loading…</div>
    <button id="settings-toggle-btn" class="btn-neutral" title="Settings" aria-expanded="false">Settings</button>
    <button id="reset-btn" title="Clear all decisions and rebuild the queue from every open tab">
      Forget decisions
    </button>
  </header>

  <div id="settings-panel" class="settings-panel" hidden>
    <label class="settings-row">
      <input type="checkbox" id="setting-include-pinned" />
      Include pinned tabs
    </label>
    <label class="settings-row">
      <span>Order</span>
      <select id="setting-sort-order">
        <option value="lru">Oldest viewed first</option>
        <option value="tab-order">Tab order, as arranged</option>
      </select>
    </label>
    <p class="settings-hint">Changing either of these rebuilds the queue from scratch.</p>
  </div>

  <div id="position-bar">
    <span id="position-label">—</span>
    <div id="position-controls">
      <button id="step-back-10" class="btn-neutral" title="Back 10">-10</button>
      <button id="step-back-1" class="btn-neutral" title="Back 1">-1</button>
      <input id="jump-input" type="number" min="1" placeholder="#" title="Jump to position" />
      <button id="jump-btn" class="btn-neutral">Go</button>
      <button id="step-fwd-1" class="btn-neutral" title="Skip 1">+1</button>
      <button id="step-fwd-10" class="btn-neutral" title="Skip 10">+10</button>
    </div>
  </div>

  <section id="current-card" aria-live="polite">
    <p class="empty">Loading…</p>
  </section>

  <section id="summary-card" class="summary-card" hidden>
    <h2>Session complete</h2>
    <div class="summary-stats">
      <div class="stat">
        <span class="stat-value" id="summary-kept">0</span>
        <span class="stat-label">kept</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="summary-thrown">0</span>
        <span class="stat-label">thrown</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="summary-duplicates">0</span>
        <span class="stat-label">duplicates closed</span>
      </div>
    </div>
    <button id="summary-restart-btn" class="btn-keep">Start a new review</button>
  </section>

  <div id="duplicate-panel" class="duplicate-panel" hidden>
    <p id="duplicate-summary" class="duplicate-summary"></p>
    <ul id="duplicate-list" class="duplicate-list"></ul>
    <div class="duplicate-actions">
      <button id="duplicate-close-btn" class="btn-neutral">Close selected</button>
      <button id="duplicate-throw-all-btn" class="btn-throw" title="Close this tab and every duplicate together">Throw all</button>
    </div>
  </div>

  <div id="domain-banner" class="domain-banner" hidden>
    <span id="domain-banner-text"></span>
    <button id="domain-bump-btn" class="btn-neutral">Review these next</button>
  </div>

  <div id="notice" class="notice" hidden></div>

  <div id="action-row">
    <button id="peek-btn" class="btn-neutral">Peek</button>
    <button id="keep-btn" class="btn-keep">Keep</button>
    <button id="throw-btn" class="btn-throw">Throw</button>
  </div>
</div>
<script src="decider.js"></script>
</body>
</html>
